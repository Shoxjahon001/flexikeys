<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Cloud Mascot</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Cute cloud mascot with 3 circles, original colors</desc>
<defs>
  <radialGradient id="mainGrad" cx="42%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#d8eef5"/>
    <stop offset="55%" stop-color="#b8d8ec"/>
    <stop offset="100%" stop-color="#90bcd8"/>
  </radialGradient>
  <radialGradient id="leftGrad" cx="42%" cy="36%" r="58%">
    <stop offset="0%" stop-color="#cceee0"/>
    <stop offset="55%" stop-color="#a8d8c8"/>
    <stop offset="100%" stop-color="#80bfaa"/>
  </radialGradient>
  <radialGradient id="rightGrad" cx="42%" cy="36%" r="58%">
    <stop offset="0%" stop-color="#d8e8f8"/>
    <stop offset="55%" stop-color="#b8cef0"/>
    <stop offset="100%" stop-color="#90aee0"/>
  </radialGradient>
  <radialGradient id="shine" cx="35%" cy="28%" r="45%">
    <stop offset="0%" stop-color="white" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <filter id="soft" x="-8%" y="-8%" width="116%" height="116%">
    <feGaussianBlur stdDeviation="4"/>
  </filter>
  <filter id="drop">
    <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#80aac8" flood-opacity="0.22"/>
  </filter>
</defs>


<ellipse cx="340" cy="438" rx="130" ry="16" fill="#90bcd8" opacity="0.15" filter="url(#soft)" style="fill:rgb(144, 188, 216);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>


<circle cx="224" cy="318" r="88" fill="url(#leftGrad)" filter="url(#drop)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
